<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Stile bold: contorni neri su sfondo trasparente. Bordi strutturali irrobustiti (~x1.5); marchi piccoli mantenuti leggibili. -->

  <defs>
    <clipPath id="fuoriTelaio">
      <path d="M0 0 H1000 V1000 H0 Z M167 57 H972 V808 H167 Z" clip-rule="evenodd"/>
    </clipPath>
  </defs>

  <!-- ====== STAFFE / CLIP (dietro al telaio) ====== -->
