    <g fill="none" stroke="#000000" stroke-width="9">
      <rect x="28" y="113" width="174" height="144" rx="14"/>
      <circle cx="97" cy="185" r="28"/>
    </g>
    <rect x="608" y="26" width="164" height="58" rx="8" fill="none" stroke="#000000" stroke-width="9"/>
