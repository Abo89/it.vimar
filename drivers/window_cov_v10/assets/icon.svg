<svg viewBox="0 0 380 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Stesso stile: tutto trasparente, solo contorni neri. Bordi irrobustiti, spazio aumentato attorno al foro. -->

  <!-- ===== CORNICE ESTERNA (stile placca Vimar) ===== -->
  <rect x="12" y="12" width="356" height="576" rx="32" ry="32"
        fill="none" stroke="#000000" stroke-width="7"/>
  <rect x="40" y="40" width="300" height="520" rx="22" ry="22"
        fill="none" stroke="#000000" stroke-width="4"/>

  <!-- ===== CONTENUTO (tasti) ===== -->
  <g transform="translate(50,60)">
    <!-- ===== TASTO SUPERIORE ===== -->
    <rect x="14" y="12" width="252" height="190" rx="14" ry="14"
          fill="none" stroke="#000000" stroke-width="4"/>

    <!-- Freccia SU (tapparella sale) -->
    <polygon points="140,91 86,143 194,143" fill="none" stroke="#000000" stroke-width="7" stroke-linejoin="round"/>

    <!-- ===== FORO CENTRALE ===== -->
    <circle cx="140" cy="240" r="14" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="140" cy="240" r="6" fill="#000000"/>

    <!-- ===== TASTO INFERIORE ===== -->
    <rect x="14" y="278" width="252" height="190" rx="14" ry="14"
          fill="none" stroke="#000000" stroke-width="4"/>

    <!-- Freccia GIÙ (tapparella scende) -->
    <polygon points="86,337 194,337 140,389" fill="none" stroke="#000000" stroke-width="7" stroke-linejoin="round"/>
  </g>
</svg>
