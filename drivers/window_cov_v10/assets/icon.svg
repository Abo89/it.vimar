<svg viewBox="0 0 380 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ombra interna sottile -->
  </defs>

  <!-- Sfondo trasparente -->

  <!-- ===== CORNICE ESTERNA (stile placca Vimar) ===== -->
  <!-- Placca esterna -->
  <rect x="12" y="12" width="356" height="576" rx="32" ry="32"
        fill="none" stroke="#000000" stroke-width="3.5"/>
  <!-- Cornice interna -->
  <rect x="40" y="40" width="300" height="520" rx="22" ry="22"
        fill="none" stroke="#000000" stroke-width="2"/>

  <!-- ===== CONTENUTO (tasti) ===== -->
  <g transform="translate(50,60)">
    <!-- ===== TASTO SUPERIORE ===== -->
    <g>
      <rect x="14" y="12" width="252" height="210" rx="14" ry="14"
            fill="none" stroke="#000000" stroke-width="1"/>
    </g>

    <!-- Freccia SU (tapparella sale) - stile contorno -->
    <polygon points="140,91 86,143 194,143" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round"/>

    <!-- ===== TACCA / FORO CENTRALE ===== -->
    <circle cx="140" cy="240" r="14" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="140" cy="240" r="6" fill="#000000"/>

    <!-- ===== TASTO INFERIORE ===== -->
    <g>
      <rect x="14" y="258" width="252" height="210" rx="14" ry="14"
            fill="none" stroke="#000000" stroke-width="1"/>
    </g>

    <!-- Freccia GIÙ (tapparella scende) - stile contorno -->
    <polygon points="86,337 194,337 140,389" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round"/>
  </g>
</svg>
