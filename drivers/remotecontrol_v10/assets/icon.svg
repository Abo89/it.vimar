<svg viewBox="0 0 280 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#fbfbfb"/>
      <stop offset="100%" stop-color="#ededed"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ===== TASTO SUPERIORE ===== -->
  <g filter="url(#soft)">
    <rect x="14" y="12" width="252" height="210" rx="14" ry="14"
          fill="url(#btnGrad)" stroke="#e2e2e2" stroke-width="1"/>
  </g>

  <!-- ===== TACCA / FORO CENTRALE ===== -->
  <circle cx="140" cy="240" r="14" fill="#ffffff" stroke="#d8d8d8" stroke-width="1.5"/>
  <circle cx="140" cy="240" r="6" fill="#eaeaea"/>

  <!-- ===== TASTO INFERIORE ===== -->
  <g filter="url(#soft)">
    <rect x="14" y="258" width="252" height="210" rx="14" ry="14"
          fill="url(#btnGrad)" stroke="#e2e2e2" stroke-width="1"/>
  </g>
</svg>
